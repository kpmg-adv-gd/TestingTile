<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PoDPlugins</title>

	<script src="TestingTile/libs/jspdf.umd.min.js"></script>
	<script src="TestingTile/libs/jspdf.plugin.autotable.min.js"></script>

	<script id="sap-ui-bootstrap"
		src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
		data-sap-ui-theme="sap_fiori_3"
		data-sap-ui-resourceroots='{"kpmg.custom.testingTile.TestingTile": "./TestingTile"}'
		data-sap-ui-compatVersion="edge"
		data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
		data-sap-ui-async="true"
		data-sap-ui-frameOptions="trusted">
	</script>
</head>

<body class="sapUiBody">
	<div
		data-sap-ui-component
		data-name="kpmg.custom.testingTile.TestingTile"
		data-id="container"
		data-settings='{"id" : "TestingTile"}'>
	</div>
</body>
</html>
